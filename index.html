<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRAZY SPOT — Menu</title>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tilt+Neon&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  fontFamily:{
    neon:['"Tilt Neon"','"Trebuchet MS"','Verdana','sans-serif'],
    body:['Outfit','"Segoe UI"','Roboto','Arial','sans-serif'],
    mono:['"JetBrains Mono"','"Courier New"','monospace'],
  },
  colors:{
    abyss:'#020611', cyan:'#00e5ff', blue:'#2979ff', ice:'#dff4ff',
    steel:'#6b87a6',
  }
}}};
</script>
<style>
:root{ --cyan:#00e5ff; --blue:#2979ff; --ice:#dff4ff; }
html,body{ background:#020611; height:100%; overflow:hidden;
  -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none; cursor:none; }
::selection{ background:var(--cyan); color:#020611; }

/* ======== fondo neón (CSS, nítido y ligero) ======== */
#bg{ position:fixed; inset:0; z-index:0; overflow:hidden; contain:layout style paint;
  background:radial-gradient(130% 100% at 50% -20%, #0c2c52 0%, #071a36 44%, #03091a 100%); }
#bg .g{ position:absolute; border-radius:50%; will-change:transform; }
#bg .g1{ width:55vw; height:55vw; left:-10vw; top:-14vh;
  background:radial-gradient(circle, rgba(0,200,255,.42), rgba(0,200,255,0) 62%);
  animation: drift1 40s ease-in-out infinite; }
#bg .g2{ width:52vw; height:52vw; right:-12vw; top:16vh;
  background:radial-gradient(circle, rgba(41,121,255,.42), rgba(41,121,255,0) 62%);
  animation: drift2 46s ease-in-out infinite; }
#bg .vig{ position:absolute; inset:0;
  background:radial-gradient(125% 120% at 50% 45%, transparent 52%, rgba(2,6,15,.72) 100%); }
@keyframes drift1{ 0%,100%{ transform:translate(0,0) } 50%{ transform:translate(6vw,5vh) } }
@keyframes drift2{ 0%,100%{ transform:translate(0,0) } 50%{ transform:translate(-5vw,4vh) } }

/* ======== letrero neón ======== */
.neon-sign{
  color:#fff;
  text-shadow:
    0 0 4px rgba(223,244,255,.95),
    0 0 14px var(--cyan),
    0 0 34px var(--cyan),
    0 0 72px var(--blue),
    0 0 120px var(--blue);
  animation: neonFlicker 9s linear infinite;
}
@keyframes neonFlicker{
  0%,100%{ opacity:1 }
  3.2%{ opacity:.5 } 3.6%{ opacity:1 }
  7.1%{ opacity:.75 } 7.3%{ opacity:1 }
  46%{ opacity:1 } 46.4%{ opacity:.55 } 46.8%{ opacity:1 }
  81%{ opacity:1 } 81.3%{ opacity:.7 } 81.5%{ opacity:1 }
}

/* ======== paneles con borde neón (ligero) ======== */
.panel{
  position:relative; border-radius:1rem;
  background: rgba(6,14,30,.66);
  border:1px solid rgba(0,229,255,.30);
  box-shadow: 0 0 16px rgba(0,229,255,.12), inset 0 0 26px rgba(41,121,255,.08), inset 0 1px 0 rgba(255,255,255,.06);
}
.panel::before{
  content:''; position:absolute; left:9%; right:9%; top:-1px; height:2px; border-radius:2px;
  background:linear-gradient(90deg, transparent, var(--cyan), transparent);
  box-shadow:0 0 8px var(--cyan); opacity:.85;
}
@keyframes spin{ to{ transform: rotate(360deg) } }

/* ======== cabeceras de categoría ======== */
.cat{
  position:relative; display:inline-block;
  font-family:'Tilt Neon';
  color:var(--cyan); letter-spacing:.22em;
  text-shadow:0 0 14px rgba(0,229,255,1), 0 0 42px rgba(0,229,255,.55);
}
.cat::after{
  content:''; position:absolute; left:0; bottom:-.4em; height:2px; width:100%;
  background:linear-gradient(90deg, var(--cyan), transparent);
  box-shadow:0 0 12px var(--cyan);
  transform:scaleX(0); transform-origin:left;
  animation: draw 1s cubic-bezier(.2,.8,.3,1) forwards;
  animation-delay: inherit;
}
@keyframes draw{ to{ transform:scaleX(1) } }

.brand{
  color:#8fb4ff;
  text-shadow:0 0 12px rgba(41,121,255,.75);
}

/* ======== filas ======== */
.row{
  display:flex; align-items:baseline; gap:.65rem;
  padding:.17em .55em .17em .7em;
  border-left:2px solid transparent; border-radius:.2rem;
  transition: background .55s ease, border-color .55s ease, transform .55s ease;
}
.row .name{ font-weight:500; letter-spacing:.015em; color:rgba(223,244,255,.92); }
.row .leader{
  flex:1; min-width:1rem; transform:translateY(-.32em);
  border-bottom:1px dashed rgba(107,135,166,.4);
}
.row .price{
  font-weight:700; letter-spacing:-.02em;
  font-feature-settings:'tnum'; color:var(--ice);
  transition: color .5s, text-shadow .5s;
}
.row.glow{
  border-left-color:var(--cyan);
  background:linear-gradient(90deg, rgba(0,229,255,.13), rgba(0,229,255,.02) 70%);
  transform:translateX(.25rem);
}
.row.glow .price{ color:var(--cyan); text-shadow:0 0 14px rgba(0,229,255,.9), 0 0 30px rgba(0,229,255,.4); }
.row.glow .name{ color:#fff; font-weight:600; text-shadow:0 0 10px rgba(223,244,255,.5); }

/* ======== entrada escalonada ======== */
.item{ opacity:0; transform:translateY(20px);
  animation: rise .8s cubic-bezier(.2,.85,.3,1) forwards; }
@keyframes rise{ to{ opacity:1; transform:none } }

/* ======== reloj ======== */
.clock-chip{
  position:relative; text-align:center;
  padding:.5vw 1.3vw .55vw;
  border-radius:.8vw;
  background:linear-gradient(160deg, rgba(0,229,255,.10), rgba(3,10,26,.7) 60%);
  border:1px solid rgba(0,229,255,.35);
  box-shadow:
    0 0 18px rgba(0,229,255,.18),
    inset 0 0 22px rgba(0,229,255,.07),
    inset 0 1px 0 rgba(255,255,255,.08);
}
.clock-chip::before{
  content:''; position:absolute; left:12%; right:12%; top:0; height:1px;
  background:linear-gradient(90deg, transparent, var(--cyan), transparent);
  filter:drop-shadow(0 0 6px var(--cyan));
}
.clock-time{
  font-size:2.1vw; font-weight:700; line-height:1; color:#fff;
  text-shadow:0 0 8px rgba(223,244,255,.9), 0 0 24px var(--cyan), 0 0 60px rgba(41,121,255,.6);
}
.clock-sep{ animation: blink 1s steps(1) infinite; color:var(--cyan); }
@keyframes blink{ 50%{ opacity:.15 } }
.clock-sec{
  font-size:.95vw; font-weight:500; color:var(--cyan);
  margin-left:.45vw; vertical-align:.75vw; opacity:.85;
  text-shadow:0 0 10px rgba(0,229,255,.8);
}
.clock-date{
  margin-top:.3vw;
  font-size:.62vw; font-weight:600; letter-spacing:.42em;
  text-transform:uppercase; color:var(--ice); opacity:.75;
}

.feature-leader{
  flex:1; min-width:1rem; transform:translateY(-.35em);
  border-bottom:1px dashed rgba(0,229,255,.35);
}

.pulse{ animation:pulse 2s ease-in-out infinite; box-shadow:0 0 12px var(--cyan); }
@keyframes pulse{ 0%,100%{ opacity:.4; transform:scale(.8) } 50%{ opacity:1; transform:scale(1.2) } }

/* ======== logo principal ======== */
.logo-wrap{
  position:relative; width:8.6vw; height:8.6vw; min-width:104px; min-height:104px;
  perspective:900px;
}
/* anillo neón giratorio alrededor (mask simple + rotate) */
.logo-wrap::before{
  content:''; position:absolute; inset:-7%; border-radius:50%;
  background: conic-gradient(rgba(0,229,255,0), var(--cyan) 18%, rgba(41,121,255,.3) 35%,
    rgba(0,229,255,0) 55%, rgba(41,121,255,.85) 80%, rgba(0,229,255,0));
  -webkit-mask: radial-gradient(closest-side, transparent 77%, #000 80%);
          mask: radial-gradient(closest-side, transparent 77%, #000 80%);
  will-change: transform;
  animation: spin 7s linear infinite;
}
/* halo */
.logo-wrap::after{
  content:''; position:absolute; inset:-28%; border-radius:50%; z-index:-1;
  background: radial-gradient(circle, rgba(0,229,255,.4), rgba(41,121,255,.14) 45%, transparent 70%);
  animation: haloPulse 3.2s ease-in-out infinite;
}
@keyframes haloPulse{ 0%,100%{ opacity:.55; transform:scale(.92) } 50%{ opacity:1; transform:scale(1.06) } }

.logo{
  position:absolute; inset:0; border-radius:50%; overflow:hidden;
  transform-style:preserve-3d;
  animation: logoFloat 4.5s ease-in-out infinite;
  filter: drop-shadow(0 0 14px rgba(0,229,255,.45));
}
.logo img{ width:100%; height:100%; display:block; }
/* brillo que barre el logo (sin blend, compositor) */
.logo::after{
  content:''; position:absolute; top:-25%; left:-60%; width:45%; height:150%;
  background:linear-gradient(105deg, transparent, rgba(255,255,255,.5), transparent);
  transform: skewX(-18deg) translateX(0);
  will-change: transform;
  animation: logoShine 7s ease-in-out infinite;
}
@keyframes logoShine{ 0%,62%{ transform:skewX(-18deg) translateX(0) } 90%,100%{ transform:skewX(-18deg) translateX(420%) } }
@keyframes logoFloat{ 0%,100%{ transform:translateY(0) rotate(-1.5deg) } 50%{ transform:translateY(-5%) rotate(1.5deg) } }

/* exhibición periódica: giro de moneda + pop + destello */
.logo-wrap.show .logo{
  animation: coinSpin 1.8s cubic-bezier(.3,.1,.25,1) forwards;
  filter: drop-shadow(0 0 16px rgba(0,229,255,.7));
}
.logo-wrap.show::after{ animation: haloBurst 1.8s ease forwards; }
@keyframes coinSpin{
  0%{ transform:rotateY(0) scale(1) }
  50%{ transform:rotateY(360deg) scale(1.15) }
  100%{ transform:rotateY(720deg) scale(1) }
}
@keyframes haloBurst{
  0%{ opacity:.6; transform:scale(.9) }
  45%{ opacity:1; transform:scale(1.5) }
  100%{ opacity:.6; transform:scale(.92) }
}

/* ======== rosin / wpff (specs de micras + precio por marca) ======== */
.subcat{ font-family:'Tilt Neon'; color:var(--cyan); letter-spacing:.2em; font-size:1.2vw;
  padding-bottom:.35vh; margin-bottom:.7vh;
  border-bottom:2px solid; border-image:linear-gradient(90deg, var(--cyan), transparent) 1;
  text-shadow:0 0 12px rgba(0,229,255,.8), 0 0 34px rgba(0,229,255,.4); }
.subcat:not(:first-child){ margin-top:1.3vh; }
.bblock{ margin-bottom:.6vh; }
.btype{ font-weight:400; opacity:.7; letter-spacing:.03em; }
.spec{ font-family:'JetBrains Mono'; font-weight:600; font-size:.9em; color:var(--cyan);
  opacity:.92; white-space:nowrap; text-shadow:0 0 8px rgba(0,229,255,.35); }
.pricetag{ margin:.4vh 0 .1vh; font-family:'JetBrains Mono'; font-weight:700; font-size:.92em;
  color:var(--ice); letter-spacing:-.01em; text-align:right;
  text-shadow:0 0 10px rgba(0,229,255,.45); }

/* TV: micro-desplazamiento anti-quemado (imperceptible, coste casi nulo) */
main{ animation: burnshift 90s ease-in-out infinite; }
@keyframes burnshift{
  0%,100%{ transform:translate(0,0) }
  25%{ transform:translate(.5%, .4%) }
  50%{ transform:translate(-.4%, .5%) }
  75%{ transform:translate(.4%, -.4%) }
}

@media (prefers-reduced-motion: reduce){
  main,.neon-sign,.panel::before,.pulse,.logo,.logo::after,.logo-wrap::before,.logo-wrap::after,#bg .g1,#bg .g2{ animation:none !important; }
  .item{ animation:none; opacity:1; transform:none; filter:none; }
  .cat::after{ animation:none; transform:scaleX(1); }
}
</style>
</head>

    <div class="flex items-center gap-7">
      <div class="flex items-center gap-2 uppercase font-medium tracking-[.3em] text-[.78vw] text-steel">
        <span class="pulse inline-block w-2 h-2 rounded-full bg-cyan"></span> Solo socios
      </div>
      <div class="clock-chip">
        <div class="clock-time font-mono tabular-nums">
          <span id="clkH">--</span><span class="clock-sep">:</span><span id="clkM">--</span><span id="clkS" class="clock-sec">--</span>

  </header>

  <!-- ======= GRID ======= -->
  <section class="flex-1 flex flex-col gap-[1.1vw] min-h-0">

    <div class="grid grid-cols-3 gap-[1.3vw] flex-1 min-h-0">

      <div class="item panel p-[1.2vw] flex flex-col min-h-0" style="animation-delay:.25s">
        <h2 class="cat text-[1.45vw] mb-[1.4vh]" style="animation-delay:.6s">WEED</h2>
        <ul id="col-weed" class="flex-1 flex flex-col justify-between text-[1.08vw]"></ul>
      </div>

      <div class="item panel p-[1.2vw] flex flex-col min-h-0" style="animation-delay:.4s">
        <h2 class="cat text-[1.45vw] mb-[1.4vh]" style="animation-delay:.75s">HASH</h2>
        <div id="col-hash" class="flex-1 flex flex-col justify-between text-[1.0vw]"></div>
      </div>

      <div class="item panel p-[1.2vw] flex flex-col min-h-0 overflow-hidden" style="animation-delay:.55s">
        <div id="col-ext" class="flex-1 flex flex-col text-[.92vw]"></div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-[1.3vw]">
      <div class="item panel px-[1.2vw] pt-[.8vw] pb-[.9vw]" style="animation-delay:.7s">
        <h2 class="cat text-[1.2vw] mb-[.9vh]" style="animation-delay:1.05s">EDIBLES</h2>
        <ul id="col-edibles" class="grid grid-cols-2 gap-x-[1.6vw] text-[1.04vw]"></ul>
      </div>
      <div class="item panel px-[1.2vw] pt-[.8vw] pb-[.9vw]" style="animation-delay:.8s">
        <h2 class="cat text-[1.2vw] mb-[.9vh]" style="animation-delay:1.15s">DRINKS</h2>
        <ul id="col-drinks" class="grid grid-cols-2 gap-x-[1.6vw] gap-y-[.2vh] text-[1.04vw]"></ul>
      </div>
    </div>
  </section>

  <!-- ======= FOOTER ======= -->
  <footer class="item flex items-center justify-between pt-[1.5vh] uppercase font-light tracking-[.45em] text-[.72vw] text-steel" style="animation-delay:.9s">
    <span>Asociación privada · prohibida la venta</span>
    <span class="text-blue/80">consumo responsable · +18</span>
  </footer>
</main>

<script type="module">
/* ============ DATOS ============ */
const WEED = [
  ['Purple Roses','12.50'], ['Red Haze','13.50'], ['Soda Pop','15'],
  ['Cosmopolis','15'], ['Azulcar #4','18'], ['Event Horizon','18'], ['Crypto Chronic','18'],
  ['Pink Guava','18'], ['Sushi','18'], ['Gas Guzzler','18'],
  ['Mind Melts','18'], ['Zangria','19'], ['Garlic Breath','19'],
];
const HASH = [
  ['', [['Orange Dry Nectar','13.50'],['Gmo Static','18'],['FF Static','28']]],
  ['Most Wanted', [['La Kush Cake · Cali Dry','30'],['Permanent Marker','40'],['Gelato 33','50']]],
  ['Staticroom', [['Pōlen Frozen Sift · Lemon Cherry','40'],['Glitter Bomb','60'],['Megan Fox','60']]],
  ['Sahas Terps', [['Tropical Juice','60'],['Banana Runtz','60']]],
  ['One Stop CA', [['Gusher Mintz','40'],['Amaretto Mintz','40']]],
];
const ROSIN = [
  { brand:'Hash Barbarian', type:'Solventless Live Rosin',
    items:[['Keylime Razz','73u-139u'],['Purple Papaya','90u-99u'],['White Thorn Rose','104u-119u']],
    note:'2g · 220€   ·   TerpBox 8g · 850€' },
];
const WPFF = [
  { brand:'1st Wash', type:'German Wpff',
    items:[['Grapaya','90u'],['Garlic Breath','73u'],['Garlic Breath','90u'],['Garlic Breath','71u-139u · Fullspec']],
    note:'1g · 80€' },
  { brand:'Chosen', type:'Single Source Wpff',
    items:[['Maroccan Peaches','73u-140u']],
    note:'1g · 100€' },
  { brand:'Cool Bred BCN', type:'Fullmelt Wpff',
    items:[['Super Boof Cherry','90u']],
    note:'Washmachine 2g · 215€' },
];
const EDIBLES = [['Gummies','25'],['Dirty Sprite','30']];
const DRINKS  = [['Agua','1.50'],['Cola','2.50'],['Ice Tea','2.50'],['Redbull','3.00']];

const row = (n,p)=>`
  <div class="row">
    <span class="name">${n}</span>
    <span class="leader"></span>
    <span class="price font-mono" data-price="${p}">0€</span>
  </div>`;

const specRow = (n,s)=>`
  <div class="row">
    <span class="name">${n}</span>
    <span class="leader"></span>
    <span class="spec font-mono">${s}</span>
  </div>`;

const brandBlock = (b)=>`
  <div class="bblock">
    <h3 class="brand uppercase tracking-[.14em] text-[.8vw] font-semibold">${b.brand}${b.type ? ` <span class="btype">· ${b.type}</span>` : ''}</h3>
    <ul class="flex flex-col gap-[.05vh] mt-[.25vh]">${b.items.map(([n,s])=>specRow(n,s)).join('')}</ul>
    ${b.note ? `<div class="pricetag font-mono">${b.note}</div>` : ''}
  </div>`;

document.getElementById('col-weed').innerHTML = WEED.map(([n,p])=>`<li>${row(n,p)}</li>`).join('');
document.getElementById('col-hash').innerHTML = HASH.map(([b,items])=>`
  <div>
    ${b ? `<h3 class="brand uppercase tracking-[.32em] text-[.8vw] font-semibold mb-[.5vh]">${b}</h3>` : ''}
    <ul class="flex flex-col gap-[.2vh]">${items.map(([n,p])=>`<li>${row(n,p)}</li>`).join('')}</ul>
  </div>`).join('');
document.getElementById('col-ext').innerHTML =
  '<div class="subcat">ROSIN</div>' + ROSIN.map(brandBlock).join('') +
  '<div class="subcat">WPFF</div>' + WPFF.map(brandBlock).join('');
document.getElementById('col-edibles').innerHTML = EDIBLES.map(([n,p])=>`<li>${row(n,p)}</li>`).join('');
document.getElementById('col-drinks').innerHTML  = DRINKS.map(([n,p])=>`<li>${row(n,p)}</li>`).join('');

const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ============ precios contando hacia arriba ============ */
const prices = [...document.querySelectorAll('.price')];
prices.forEach((el,i)=>{
  const target = parseFloat(el.dataset.price);
  const dec = el.dataset.price.includes('.') ? 2 : 0;
  if (reduced){ el.textContent = target.toFixed(dec)+'€'; return; }
  const t0 = performance.now() + 600 + i*45, dur = 900;
  (function tick(now){
    const k = Math.min(1, (now - t0)/dur);
    if (k>0){
      const e = 1-Math.pow(1-k,3);
      el.textContent = (target*e).toFixed(dec)+'€';
    }
    if (k<1) requestAnimationFrame(tick); else el.textContent = target.toFixed(dec)+'€';
  })(performance.now());
});

/* ============ reloj ============ */
const clkH=document.getElementById('clkH'), clkM=document.getElementById('clkM'),
      clkS=document.getElementById('clkS'), clkDate=document.getElementById('clkDate');
const tickClock = ()=>{
  const d=new Date();
  clkH.textContent = String(d.getHours()).padStart(2,'0');
  clkM.textContent = String(d.getMinutes()).padStart(2,'0');
  clkS.textContent = String(d.getSeconds()).padStart(2,'0');
  clkDate.textContent = d.toLocaleDateString('es-ES',{ weekday:'long', day:'numeric', month:'short' }).replace('.','');
};
tickClock(); setInterval(tickClock, 1000);

/* ============ ciclo de resaltado ============ */
if (!reduced){
  const rows=[...document.querySelectorAll('.row')]; let i=-1;
  setInterval(()=>{
    if(i>=0) rows[i].classList.remove('glow');
    i=(i+1)%rows.length; rows[i].classList.add('glow');
  }, 2400);
}

/* ============ exhibición del logo cada 15 s ============ */
const logoWrap = document.getElementById('logoWrap');
if (!reduced){
  setInterval(()=>{
    logoWrap.classList.add('show');
    setTimeout(()=> logoWrap.classList.remove('show'), 1900);
  }, 15000);
}
</script>
